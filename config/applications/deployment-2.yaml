apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-2
  annotations:
    "chtc.wisc.edu/personal-ap": "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-2
  template:
    metadata:
      labels:
        app: nginx-2
    spec:
      containers:
      - name: nginx
        image: nginx:latest
